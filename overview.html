<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>현장 인력 플랫폼 개요</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Construction Workforce Platform</p>
          <h1>현장 속도를 그대로 옮긴 3개 제품 구조</h1>
        </div>
        <div class="topbar-actions">
          <div class="segmented" id="platformMode"></div>
          <div class="segmented" id="productType"></div>
          <a class="cta ghost" href="./index.html">허브로 이동</a>
        </div>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">MVP to Launch</p>
          <h2 id="heroTitle"></h2>
          <p id="heroDescription"></p>
        </div>
        <div class="hero-metrics" id="heroMetrics"></div>
      </section>

      <main class="workspace">
        <aside class="role-rail">
          <div class="rail-card">
            <p class="eyebrow">Products</p>
            <div class="role-tabs" id="roleTabs"></div>
          </div>
          <div class="rail-card">
            <p class="eyebrow">Structure</p>
            <div class="flow">
              <div>건설사 / 현장</div>
              <span></span>
              <div>중개인 앱</div>
              <span></span>
              <div>노동자 앱</div>
              <span></span>
              <div>관리자 웹</div>
            </div>
          </div>
          <div class="rail-card" id="mvpCard"></div>
        </aside>

        <section class="content">
          <div class="content-header">
            <div>
              <p class="eyebrow" id="productLabel"></p>
              <h3 id="screenTitle"></h3>
            </div>
            <div class="screen-tabs" id="screenTabs"></div>
          </div>

          <div class="preview-grid">
            <section class="device-stage">
              <div class="device-frame" id="deviceFrame">
                <div class="device-top">
                  <div class="device-dots">
                    <span></span><span></span><span></span>
                  </div>
                  <strong id="deviceLabel"></strong>
                </div>
                <div class="device-screen" id="deviceScreen"></div>
              </div>
            </section>

            <section class="details">
              <article class="detail-card">
                <p class="eyebrow">Menu</p>
                <div class="menu-list" id="menuList"></div>
              </article>
              <article class="detail-card">
                <p class="eyebrow">Screen Goals</p>
                <div class="goal-list" id="goalList"></div>
              </article>
              <article class="detail-card">
                <p class="eyebrow">Primary Actions</p>
                <div class="action-list" id="actionList"></div>
              </article>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
